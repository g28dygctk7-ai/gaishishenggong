  <div id="roiify-banner-wrapper" style="opacity:1; position:fixed; bottom:0; left:0; right:0; z-index:999999;">

<script type="text/javascript">
(function () {
    // open web debugger console
    if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
    }

    var debug = window._CCSettings.debug;
    var splash = document.getElementById('splash');
    splash.style.display = 'block';

    function loadScript (moduleName, cb) {
      function scriptLoaded () {
          document.body.removeChild(domScript);
          domScript.removeEventListener('load', scriptLoaded, false);
          cb && cb();
      };
      var domScript = document.createElement('script');
      domScript.async = true;
      domScript.src = moduleName;
      domScript.addEventListener('load', scriptLoaded, false);
      document.body.appendChild(domScript);
    }

    loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.d4f55.js', function () {
      if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
        loadScript(debug ? 'physics.js' : 'physics-min.941a2.js', window.boot);
      }
      else {
        window.boot();
      }
    });
})();
</script>

<!-- RoiifyAds 横幅广告初始化 -->
<script>
(function() {
    var BANNER_PLACEMENT_ID = 'plc_jl4pth1i5zkq'; // 默认横幅
    var POLL_COUNT = 0;
    var MAX_POLLS = 50; // 最多等15秒

    function initRoiifyBanner() {
        POLL_COUNT++;
        if (typeof RoiifyAds === 'undefined') {
            if (POLL_COUNT <= MAX_POLLS) {
                console.log('[RoiifyAds] 等待SDK加载... 第' + POLL_COUNT + '次, URL=' + location.href);
                setTimeout(initRoiifyBanner, 300);
            } else {
                console.error('[RoiifyAds] SDK超时未加载! 请检查roiify.net是否可访问');
                // 显示加载失败提示
                var el = document.getElementById('roiify-banner-container');
                if (el) el.innerHTML = '<div style="color:#ff6b6b;text-align:center;padding:10px;">广告SDK加载失败</div>';
            }
            return;
        }
        console.log('[RoiifyAds] SDK就绪, 开始初始化, placementId=' + BANNER_PLACEMENT_ID + ', URL=' + location.href);
        var wrapper = document.getElementById('roiify-banner-wrapper');
        try {
            RoiifyAds.show(BANNER_PLACEMENT_ID, '#roiify-banner-container', {
                theme: 'dark',
                format: 'banner'
            });
            console.log('[RoiifyAds] RoiifyAds.show() 调用成功');
        } catch(e) {
            console.error('[RoiifyAds] RoiifyAds.show() 报错:', e);
        }
        // 初始化时即创建关闭按钮
        if (!document.getElementById('roiify-close-btn')) {
            var btn = document.createElement('div');
            btn.id = 'roiify-close-btn';
            btn.textContent = '✕';
            btn.onclick = function(){ window.RoiifyBanner.hide(); };
            btn.style.cssText = 'position:fixed!important;top:0!important;right:0!important;width:40px!important;height:30px!important;padding:0!important;margin:0!important;background:#ff4444!important;color:#fff!important;border:none!important;border-radius:0!important;font-size:18px!important;font-weight:bold!important;line-height:30px!important;text-align:center!important;z-index:2147483647!important;pointer-events:auto!important;opacity:1!important;visibility:visible!important;display:block!important;cursor:pointer!important;';
            document.body.appendChild(btn);
        }
    }

    // 不等load事件, 立即开始轮询(因为async脚本不会阻塞load)
    console.log('[RoiifyAds] 开始等待SDK, 当前URL=' + location.href);
    initRoiifyBanner();

    // 暴露全局方法给游戏调用
    window.RoiifyBanner = {
        show: function() {
            var wrapper = document.getElementById('roiify-banner-wrapper');
            if (wrapper) wrapper.style.opacity = '1';
            var btn = document.getElementById('roiify-close-btn');
            if (btn) btn.style.display = 'block';
            console.log('[RoiifyBanner] 显示');
        },
        hide: function() {
            var wrapper = document.getElementById('roiify-banner-wrapper');
            if (wrapper) wrapper.style.opacity = '0';
            var btn = document.getElementById('roiify-close-btn');
            if (btn) btn.style.display = 'none';
            console.log('[RoiifyBanner] 隐藏');
        }
    };
})();
</script>
</body>
